rules:
  - id: EXT001
    name: SSN Pattern
    category: pii_exfiltration
    severity: high
    description: US Social Security Number pattern
    pattern: "\\b(?!000|666|9\\d{2})\\d{3}-(?!00)\\d{2}-(?!0000)\\d{4}\\b"

  - id: EXT002
    name: Credit Card Number
    category: pii_exfiltration
    severity: critical
    description: Major credit card number patterns (Visa, MC, Amex, Discover)
    pattern: "\\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|6(?:011|5[0-9]{2})[0-9]{12})\\b"

  - id: EXT003
    name: Email Address Bulk Exfiltration
    category: pii_exfiltration
    severity: medium
    description: Multiple email addresses suggesting bulk PII extraction
    pattern: "(?i)([a-z0-9._%+\\-]+@[a-z0-9.\\-]+\\.[a-z]{2,}[,;\\s]+){2,}"

  - id: EXT004
    name: Password in Prompt
    category: pii_exfiltration
    severity: high
    description: Plain-text password or secret key patterns
    pattern: "(?i)(password\\s*[:=]\\s*\\S+|passwd\\s*[:=]\\s*\\S+|secret\\s*[:=]\\s*\\S+|api[_\\-]?key\\s*[:=]\\s*\\S+|access[_\\-]?token\\s*[:=]\\s*\\S+)"

  - id: EXT005
    name: Training Data Extraction
    category: extraction
    severity: high
    description: Attempts to extract the model's training data
    pattern: "(?i)(extract|dump|export|retrieve|output|show|print|list)\\s+(all\\s+)?(your\\s+)?(training\\s+data|training\\s+examples?|training\\s+corpus|dataset|training\\s+set)"

  - id: EXT006
    name: Confidential Document Leak
    category: extraction
    severity: high
    description: Attempts to extract confidential or proprietary documents
    pattern: "(?i)(show|print|output|reveal|disclose|share|send|give\\s+me)\\s+(all\\s+)?(confidential|proprietary|internal|private|secret|classified)\\s+(documents?|files?|data|information|records?)"

  - id: EXT007
    name: Database Schema Extraction
    category: extraction
    severity: high
    description: Attempts to extract database structure or contents
    pattern: "(?i)(show|list|dump|describe|output|print)\\s+(the\\s+)?(database|db|table|schema|column|index)\\s+(structure|schema|layout|contents?|names?|list)"

  - id: EXT008
    name: Environment Variable Leak
    category: extraction
    severity: critical
    description: Attempts to read environment variables or config secrets
    pattern: "(?i)(print|show|output|reveal|read|access|get)\\s+(all\\s+)?(env(ironment)?\\s+variables?|process\\.env|os\\.environ|config\\s+secrets?|\\$\\{?[A-Z_]+\\}?)"

  - id: EXT009
    name: Phone Number PII
    category: pii_exfiltration
    severity: medium
    description: US phone number patterns indicating PII in prompt
    pattern: "\\b(\\+1[-\\s]?)?\\(?([0-9]{3})\\)?[-\\s]?([0-9]{3})[-\\s]?([0-9]{4})\\b(?:[,;\\s]+\\(?(\\d{3})\\)?[-\\s]?\\d{3}[-\\s]?\\d{4}\\b){1,}"
