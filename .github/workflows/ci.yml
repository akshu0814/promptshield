name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: promptshield
          POSTGRES_PASSWORD: promptshield
          POSTGRES_DB: promptshield
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://promptshield:promptshield@localhost:5432/promptshield
          API_SECRET_KEY: ci-test-key
        run: |
          cd api
          pytest tests/ -v --tb=short

      - name: Verify rule count
        run: |
          cd api
          python -c "
          from scanner.rule_engine import RuleEngine
          e = RuleEngine('rules')
          assert e.rule_count >= 26, f'Expected 26+ rules, got {e.rule_count}'
          print(f'OK — {e.rule_count} rules loaded')
          "
