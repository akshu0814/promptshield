services:
  - type: web
    name: promptshield-api
    runtime: python
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements-prod.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: promptshield-db
          property: connectionString
      - key: API_SECRET_KEY
        generateValue: true
      - key: ML_ENABLED
        value: "false"
      - key: SLACK_WEBHOOK_URL
        value: ""
 
databases:
  - name: promptshield-db
    databaseName: promptshield
    user: promptshield
    plan: free