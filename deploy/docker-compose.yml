version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: promptshield
      POSTGRES_PASSWORD: promptshield
      POSTGRES_DB: promptshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptshield"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://promptshield:promptshield@postgres:5432/promptshield
      API_SECRET_KEY: ""
      SLACK_WEBHOOK_URL: ""
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
